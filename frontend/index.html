<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI Task Planner - Умный планировщик задач</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>

    <div class="app-container">
        <!-- ЛЕВАЯ КОЛОНКА -->
        <div class="left-panel" id="leftPanel">
            <div class="left-content">
                <div class="header">
                    <h1>🤖 AI Task Planner</h1>
                    <p>Умный планировщик с искусственным интеллектом</p>
                </div>

                <!-- БЛОК АУТЕНТИФИКАЦИИ -->
                <div id="authBlock" class="auth-section">
                    <div class="auth-tabs">
                        <button class="auth-tab active" onclick="switchAuthTab('login')">🔐 Вход</button>
                        <button class="auth-tab" onclick="switchAuthTab('register')">📝 Регистрация</button>
                    </div>
                    
                    <form id="loginForm" class="auth-form" onsubmit="login(event)">
                        <input type="email" id="loginEmail" placeholder="Email" required>
                        <input type="password" id="loginPassword" placeholder="Пароль" required>
                        <button type="submit" class="auth-btn">Войти</button>
                    </form>
                    
                    <form id="registerForm" class="auth-form" style="display: none;" onsubmit="register(event)">
                        <input type="text" id="regUsername" placeholder="Имя пользователя" required>
                        <input type="email" id="regEmail" placeholder="Email" required>
                        <input type="password" id="regPassword" placeholder="Пароль" required>
                        <input type="password" id="regConfirmPassword" placeholder="Подтвердите пароль" required>
                        <button type="submit" class="auth-btn">Зарегистрироваться</button>
                    </form>
                </div>

                <!-- ПАНЕЛЬ ПОЛЬЗОВАТЕЛЯ -->
                <div id="userPanel" class="user-panel" style="display: none;">
                    <div class="user-info">
                        <div class="user-avatar">👤</div>
                        <div class="user-name" id="userName">Пользователь</div>
                        <div class="user-email" id="userEmail">user@example.com</div>
                    </div>
                    <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
                </div>

                <!-- СТАТУС СЕРВЕРА -->
                <div id="status" class="status offline">🔄 Проверка подключения...</div>

                <!-- ФОРМА СОЗДАНИЯ ЗАДАЧИ -->
                <div class="form-card" id="taskFormBlock" style="display: none;">
                    <textarea id="taskText" rows="3" placeholder="Опишите задачу...&#10;Например: Завтра в 15:00 важное совещание по диплому"></textarea>
                    <button id="createBtn" onclick="createTask()">✨ Создать задачу</button>
                </div>

                <!-- УПРАВЛЕНИЕ ТЕГАМИ С ФИЛЬТРАЦИЕЙ -->
                <div class="tags-section" id="tagsBlock" style="display: none;">
                    <div class="tags-header">
                        <h4>🏷️ Мои теги</h4>
                        <div>
                            <button class="clear-filter-btn" onclick="clearTagFilter()" id="clearFilterBtn" style="display: none;">✖️ Сбросить фильтр</button>
                            <button class="add-tag-btn" onclick="showAddTagInput()">+ Добавить тег</button>
                        </div>
                    </div>
                    <div id="tagsList" class="tags-list"></div>
                    <div id="addTagInput" class="add-tag-input">
                        <input type="text" id="newTagName" placeholder="Название тега" maxlength="20">
                        <button onclick="addTag()">Добавить</button>
                        <button onclick="hideAddTagInput()" style="background:#6c757d;">Отмена</button>
                    </div>
                </div>

                <!-- ФИЛЬТР СТАТУСА -->
                <div class="filter-section" id="filterBlock" style="display: none;">
                    <div class="filter-header">
                        <h4>🔍 Фильтры</h4>
                    </div>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all" onclick="setStatusFilter('all')">📋 Все</button>
                        <button class="filter-btn" data-filter="active" onclick="setStatusFilter('active')">⏳ Активные</button>
                        <button class="filter-btn" data-filter="completed" onclick="setStatusFilter('completed')">✅ Выполненные</button>
                    </div>
                </div>

                <!-- РЕЗУЛЬТАТ -->
                <div id="result" style="display: none;"></div>

                <!-- СПИСОК ЗАДАЧ -->
                <div class="section-title">
                    <span>📋 Мои задачи</span>
                    <span id="taskCount" class="task-count">0</span>
                </div>
                <div id="tasksList" class="task-list">
                    <div class="empty-state">✨ Войдите в систему, чтобы видеть задачи</div>
                </div>
            </div>
        </div>

        <!-- ПРАВАЯ КОЛОНКА - КАЛЕНДАРЬ -->
        <div class="right-panel">
            <div class="right-content">
                <div class="calendar-header">
                    <button class="calendar-nav-btn" onclick="prevMonth()">◀</button>
                    <span id="currentMonth" class="current-month"></span>
                    <button class="calendar-nav-btn" onclick="nextMonth()">▶</button>
                </div>
                <div class="calendar-weekdays">
                    <span>ПН</span><span>ВТ</span><span>СР</span><span>ЧТ</span><span>ПТ</span><span>СБ</span><span>ВС</span>
                </div>
                <div id="calendarDays" class="calendar-days"></div>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО РЕДАКТИРОВАНИЯ -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>✏️ Редактировать задачу</h3>
            <input type="text" id="editTitle" placeholder="Название задачи">
            <input type="datetime-local" id="editDate">
            <select id="editPriority">
                <option value="low">🟢 Низкий</option>
                <option value="medium" selected>🟡 Средний</option>
                <option value="high">🔴 Высокий</option>
            </select>
            <div id="editTagsContainer" style="margin-bottom: 15px;">
                <label style="font-size: 12px; color: #666;">Теги:</label>
                <div id="editTagsList" style="display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px;"></div>
            </div>
            <div class="modal-buttons">
                <button class="save-btn" onclick="saveEdit()">💾 Сохранить</button>
                <button class="cancel-btn" onclick="closeModal()">❌ Отмена</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
