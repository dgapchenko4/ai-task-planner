<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Task Planner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 20px; }
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background: #5a67d8; }
        .task {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 4px solid #667eea;
        }
        .task-title { font-weight: bold; }
        .task-date { color: #28a745; font-size: 12px; margin-top: 5px; }
        .delete-btn {
            background: #dc3545;
            width: auto;
            padding: 5px 15px;
            margin-top: 10px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }
        .stat-value { font-size: 24px; font-weight: bold; color: #667eea; }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading { text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI Task Planner</h1>
        <div class="subtitle">Опишите задачу - AI создаст структуру</div>
        
        <textarea id="taskInput" rows="3" placeholder="Например: Завтра в 15:00 важное совещание по диплому"></textarea>
        
        <button id="processBtn" onclick="processTask()">✨ Обработать с помощью AI</button>
        
        <div id="result" style="margin-top: 20px;"></div>
        
        <h2 style="margin-top: 30px;">📋 Мои задачи</h2>
        <div id="tasks"></div>
        
        <div class="stats">
            <div><div class="stat-value" id="totalCount">0</div><div>Всего</div></div>
            <div><div class="stat-value" id="completedCount">0</div><div>Выполнено</div></div>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
        
        function renderTasks() {
            const container = document.getElementById('tasks');
            if (tasks.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:#999;padding:40px;">Нет задач</div>';
                return;
            }
            
            container.innerHTML = tasks.map(task => `
                <div class="task">
                    <div class="task-title">${escapeHtml(task.title)}</div>
                    <div class="task-date">${task.due_date_display || 'Без срока'}</div>
                    <div style="font-size:12px;color:#666;">Приоритет: ${task.priority} | Теги: ${task.tags.join(', ')}</div>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id})">
                        <button class="delete-btn" onclick="deleteTask(${task.id})">Удалить</button>
                    </div>
                </div>
            `).join('');
        }
        
        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                localStorage.setItem('tasks', JSON.stringify(tasks));
                renderTasks();
                updateStats();
            }
        }
        
        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderTasks();
            updateStats();
        }
        
        function updateStats() {
            document.getElementById('totalCount').textContent = tasks.length;
            document.getElementById('completedCount').textContent = tasks.filter(t => t.completed).length;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function processTask() {
            const text = document.getElementById('taskInput').value.trim();
            if (!text) {
                alert('Введите описание задачи');
                return;
            }
            
            const resultDiv = document.getElementById('result');
            const processBtn = document.getElementById('processBtn');
            
            processBtn.disabled = true;
            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>🤔 AI анализирует...</div>';
            
            console.log("📤 Отправка запроса:", text);
            
            try {
                const response = await fetch('http://localhost:5000/api/ai/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                
                console.log("📥 Статус ответа:", response.status);
                
                const data = await response.json();
                console.log("📥 Данные ответа:", data);
                
                if (data.success) {
                    const result = data.result;
                    
                    const newTask = {
                        id: Date.now(),
                        title: result.title || text.substring(0, 50),
                        due_date: result.due_date,
                        due_date_display: result.due_date_display,
                        priority: result.priority || 'medium',
                        tags: result.tags || ['задача'],
                        completed: false,
                        created: new Date().toLocaleString()
                    };
                    
                    tasks.unshift(newTask);
                    localStorage.setItem('tasks', JSON.stringify(tasks));
                    
                    resultDiv.innerHTML = `
                        <div style="background:#d4edda;padding:15px;border-radius:10px;">
                            ✅ Задача создана!<br>
                            📝 ${newTask.title}<br>
                            📅 ${newTask.due_date_display || 'Без срока'}<br>
                            🏷️ ${newTask.tags.join(', ')}
                        </div>
                    `;
                    
                    document.getElementById('taskInput').value = '';
                    renderTasks();
                    updateStats();
                    
                    setTimeout(() => resultDiv.innerHTML = '', 3000);
                } else {
                    throw new Error(data.error || 'Ошибка');
                }
            } catch (error) {
                console.error("❌ Ошибка:", error);
                resultDiv.innerHTML = `
                    <div style="background:#f8d7da;padding:15px;border-radius:10px;">
                        ❌ Ошибка: ${error.message}<br>
                        Проверьте консоль (F12) для деталей
                    </div>
                `;
            } finally {
                processBtn.disabled = false;
            }
        }
        
        renderTasks();
        updateStats();
    </script>
</body>
</html>
